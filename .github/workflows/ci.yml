name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run test

      - run: npm run build

      # Lint reports issues without failing the build — the lint-sweep routine
      # is gradually clearing the remaining ~48 React 19 errors. Switch back to
      # blocking once the count reaches zero.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
